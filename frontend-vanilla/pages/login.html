<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SplitCampus</title>
    <script src="/js/utils/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-copy">
        <a class="brand" href="/">SplitCampus</a>
        <h1>Welcome back</h1>
        <p>Log in to view your groups, expenses, balances, and settlements. Because who actually has time to maintain a shared Excel sheet? 📊</p>
      </section>
      <section class="auth-card card">
        <form id="loginForm" class="stack-md">
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="username email" required />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary btn-block" type="submit">Login</button>
        </form>
        <p class="auth-footer">
          New here?
          <a href="/pages/signup.html">Create an account</a>
        </p>
      </section>
    </main>

    <script type="module" src="/js/pages/login.js"></script>
  </body>
</html>
