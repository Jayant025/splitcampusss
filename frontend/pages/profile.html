<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | SplitCampus</title>
    <script src="/js/utils/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <header id="topbar" class="topbar"></header>
        <main class="page-content stack-lg">
          <section class="content-grid two-column">
            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Your profile</h2>
                  <p>Update your visible details and profile image</p>
                </div>
              </div>
              <div id="profileSummary"></div>
              <form id="profileForm" class="stack-md">
                <div>
                  <label for="name">Name</label>
                  <input id="name" name="name" type="text" required />
                </div>
                <div>
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" required />
                </div>
                <div>
                  <label for="profilePhoto">Profile photo</label>
                  <input id="profilePhoto" name="profilePhoto" type="file" accept="image/*" />
                </div>
                <button class="btn btn-primary" type="submit">Save profile</button>
              </form>
            </article>

            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Change password</h2>
                  <p>Use at least 6 characters for the new password</p>
                </div>
              </div>
              <form id="passwordForm" class="stack-md">
                <div>
                  <label for="currentPassword">Current password</label>
                  <input id="currentPassword" name="currentPassword" type="password" required />
                </div>
                <div>
                  <label for="newPassword">New password</label>
                  <input id="newPassword" name="newPassword" type="password" required />
                </div>
                <button class="btn btn-secondary" type="submit">Update password</button>
              </form>
            </article>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/js/pages/profile.js"></script>
  </body>
</html>
