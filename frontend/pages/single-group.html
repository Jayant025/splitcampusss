<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Details | SplitCampus</title>
    <script src="/js/utils/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <header id="topbar" class="topbar"></header>
        <main class="page-content stack-lg">
          <section id="groupHero" class="card"></section>

          <section class="content-grid two-column">
            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Members</h2>
                  <p>View roles, invite code, and manage access</p>
                </div>
              </div>
              <form id="addMemberForm" class="inline-form">
                <input id="memberEmail" name="email" type="email" placeholder="Add member by email" />
                <button class="btn btn-secondary" type="submit">Add member</button>
              </form>
              <div id="membersList"></div>
            </article>

            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Balances</h2>
                  <p>See who owes whom and current net positions</p>
                </div>
              </div>
              <div id="balanceSummary"></div>
            </article>
          </section>

          <section class="content-grid two-column">
            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Recent activity</h2>
                  <p>Latest group events</p>
                </div>
              </div>
              <div id="activityList"></div>
            </article>

            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Suggested settlements</h2>
                  <p>Fast view of simplified debt suggestions</p>
                </div>
              </div>
              <div id="debtSuggestions"></div>
            </article>
          </section>

          <section class="card stack-md">
            <div class="section-header">
              <div>
                <h2>Expenses</h2>
                <p>Search, filter, sort, edit, and remove group expenses</p>
              </div>
            </div>
            <form id="expenseFiltersForm" class="filter-grid">
              <input id="search" name="search" type="text" placeholder="Search expense title" />
              <select id="category" name="category">
                <option value="">All categories</option>
                <option value="food">Food</option>
                <option value="rent">Rent</option>
                <option value="wifi">Wi-Fi</option>
                <option value="electricity">Electricity</option>
                <option value="grocery">Grocery</option>
                <option value="travel">Travel</option>
                <option value="miscellaneous">Miscellaneous</option>
                <option value="custom">Custom</option>
              </select>
              <select id="member" name="member">
                <option value="">All members</option>
              </select>
              <input id="startDate" name="startDate" type="date" />
              <input id="endDate" name="endDate" type="date" />
              <select id="sort" name="sort">
                <option value="latest">Latest</option>
                <option value="highest">Highest amount</option>
                <option value="oldest">Oldest</option>
                <option value="lowest">Lowest amount</option>
              </select>
              <button class="btn btn-secondary" type="submit">Apply filters</button>
            </form>
            <div id="expensesList"></div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/js/pages/single-group.js"></script>
  </body>
</html>
