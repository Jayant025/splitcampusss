<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groups | SplitCampus</title>
    <script src="/js/utils/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <header id="topbar" class="topbar"></header>
        <main class="page-content stack-lg">
          <section class="content-grid two-column">
            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Create a group</h2>
                  <p>Start a hostel, flat, trip, or event expense space</p>
                </div>
              </div>
              <form id="createGroupForm" class="stack-md">
                <div>
                  <label for="groupName">Group name</label>
                  <input id="groupName" name="name" type="text" required />
                </div>
                <div>
                  <label for="groupDescription">Description</label>
                  <textarea id="groupDescription" name="description" rows="3"></textarea>
                </div>
                <div>
                  <label for="groupType">Group type</label>
                  <select id="groupType" name="type" required>
                    <option value="hostel">Hostel</option>
                    <option value="trip">Trip</option>
                    <option value="flat">Flat</option>
                    <option value="event">Event</option>
                  </select>
                </div>
                <div>
                  <label for="groupImage">Optional group image</label>
                  <input id="groupImage" name="image" type="file" accept="image/*" />
                </div>
                <button class="btn btn-primary" type="submit">Create group</button>
              </form>
            </article>

            <article class="card stack-md">
              <div class="section-header">
                <div>
                  <h2>Join using invite code</h2>
                  <p>Paste the code shared by a group admin</p>
                </div>
              </div>
              <form id="joinGroupForm" class="stack-md">
                <div>
                  <label for="inviteCode">Invite code</label>
                  <input id="inviteCode" name="inviteCode" type="text" placeholder="AB12CD34" required />
                </div>
                <button class="btn btn-secondary" type="submit">Join group</button>
              </form>
            </article>
          </section>

          <section class="card stack-md">
            <div class="section-header">
              <div>
                <h2>Your groups</h2>
                <p>Open a group to manage members, expenses, balances, and settlements</p>
              </div>
            </div>
            <div id="groupsList"></div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/js/pages/groups.js"></script>
  </body>
</html>
